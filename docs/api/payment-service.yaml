openapi: 3.0.3
info:
  title: Ticketeira Payment Service
  version: 0.1.0
  description: |
    Cobrancas, escrow, reembolsos e repasses.

    **Sprint 0:** stubs. Em Sprint 1, consome `PedidoCriado` e `EventoFinalizado` do RabbitMQ.

servers:
  - url: http://localhost:8080/api

paths:
  /payments/me:
    get:
      summary: Historico de cobrancas do usuario
      tags: [payments]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Pagamento' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    StatusPagamento:
      type: string
      enum: [PENDENTE, CONFIRMADO, REEMBOLSADO, REPASSADO]

    Pagamento:
      type: object
      properties:
        id:           { type: integer, format: int64 }
        inscricaoId:  { type: integer, format: int64 }
        valorBruto:   { type: number, format: double }
        valorTaxa:    { type: number, format: double }
        valorRepasse: { type: number, format: double }
        status:       { $ref: '#/components/schemas/StatusPagamento' }
        criadoEm:     { type: string, format: date-time }
