spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - StripPrefix=1
      routes:
        - id: auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: users
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: events
          uri: ${EVENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/events/**
        - id: tickets
          uri: ${TICKET_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/tickets/**
        - id: payments
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/payments/**
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: ${FRONTEND_ORIGIN:http://localhost:5173}
            allowedMethods: ["GET","POST","PUT","DELETE","PATCH","OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
            maxAge: 3600

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:troque-este-segredo-por-um-valor-aleatorio-de-no-minimo-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.ticketeira: DEBUG
