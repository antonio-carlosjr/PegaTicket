spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:event_db}?sslmode=${DB_SSLMODE:prefer}
    username: ${DB_USER:ticketeira}
    password: ${DB_PASS:ticketeira}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:ticketeira}
    password: ${RABBIT_PASS:ticketeira}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    rabbit:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ticketeira: DEBUG
