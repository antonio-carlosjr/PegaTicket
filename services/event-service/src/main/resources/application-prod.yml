spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
  jpa:
    show-sql: false
  flyway:
    baseline-on-migrate: true

server:
  port: ${PORT:8082}

management:
  endpoint:
    health:
      show-details: never
  health:
    rabbit:
      enabled: false

logging:
  level:
    root: INFO
    com.ticketeira: INFO
    org.hibernate: WARN
