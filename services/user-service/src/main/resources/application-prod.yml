# ============================================================
# Profile prod: usado em deploy Railway. Ativado via
# SPRING_PROFILES_ACTIVE=prod.
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
  jpa:
    show-sql: false
  flyway:
    baseline-on-migrate: true
  mail:
    host: ${SMTP_HOST:smtp.resend.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:resend}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8081}

management:
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false
    rabbit:
      enabled: false

logging:
  level:
    root: INFO
    com.ticketeira: INFO
    org.hibernate: WARN
    org.springframework.web: WARN
