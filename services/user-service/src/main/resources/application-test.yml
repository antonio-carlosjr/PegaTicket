spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.connectiontimeout: 1000
      mail.smtp.timeout: 1000
      mail.smtp.writetimeout: 1000
  datasource:
    url: jdbc:h2:mem:user_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: test-secret-com-mais-de-32-bytes-para-passar-na-validacao
  expiration-ms: 60000

app:
  mail:
    from: test@ticketeira.local
  password-reset:
    base-url: http://localhost:5173/reset-password
    ttl-minutes: 60
