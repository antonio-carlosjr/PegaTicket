spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_db}
    username: ${DB_USER:ticketeira}
    password: ${DB_PASS:ticketeira}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:ticketeira}
    password: ${RABBIT_PASS:ticketeira}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
        debug: false
  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html

app:
  mail:
    from: ${MAIL_FROM:no-reply@ticketeira.local}
  password-reset:
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:5173/reset-password}
    ttl-minutes: ${PASSWORD_RESET_TTL_MIN:60}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    rabbit:
      enabled: false
    mail:
      enabled: false

jwt:
  secret: ${JWT_SECRET:troque-este-segredo-por-um-valor-aleatorio-de-no-minimo-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ticketeira: DEBUG
