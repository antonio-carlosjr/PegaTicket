# Profile usado pelos testes de integracao com Testcontainers (Postgres + RabbitMQ reais).
# As propriedades de datasource e rabbitmq sao sobrescritas via @DynamicPropertySource nos testes.
# NAO exclui RabbitAutoConfiguration (broker real necessario para testar consumidores/produtores).

spring:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.ticketeira: DEBUG
    org.springframework.amqp: DEBUG
