spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ticket_db}?sslmode=${DB_SSLMODE:prefer}
    username: ${DB_USER:ticketeira}
    password: ${DB_PASS:ticketeira}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:ticketeira}
    password: ${RABBIT_PASS:ticketeira}

app:
  event-service:
    url: ${EVENT_SERVICE_URL:http://localhost:8082}
  internal:
    token: ${INTERNAL_TOKEN:dev-internal-secret}
  reserva:
    ttl-min: ${RESERVA_TTL_MIN:30}
    job-delay-ms: ${RESERVA_JOB_DELAY_MS:300000}  # 5 min entre execucoes

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    rabbit:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ticketeira: DEBUG
