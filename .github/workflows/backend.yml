name: Backend CI

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'pom.xml'
      - 'shared/**'
      - 'services/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'shared/**'
      - 'services/**'

jobs:
  build:
    name: build + test (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: mvn verify (reactor inteiro)
        run: mvn -B -ntp verify

      - name: Upload surefire reports (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
